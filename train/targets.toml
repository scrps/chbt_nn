# train/targets.toml — which base models to fine-tune (PLAN.md §4d, §7).
#
# `python -m train.train_qlora --target llama3.1` reads this file. Set
# `enabled = false` to skip a base. The recipe ("hp") is shared by default
# but can be overridden per-target.

[defaults.hp]
# LoRA
lora_r = 16
lora_alpha = 32
lora_dropout = 0.05
lora_target_modules = "all-linear"  # q,k,v,o + gate,up,down (PLAN.md §7a)

# Optimizer / schedule
learning_rate = 2.0e-4
optim = "paged_adamw_8bit"
lr_scheduler_type = "cosine"
warmup_ratio = 0.03
weight_decay = 0.0

# Batch
per_device_train_batch_size = 1
gradient_accumulation_steps = 16
gradient_checkpointing = true

# Sequence
max_seq_length = 2048

# Schedule
num_train_epochs = 3
eval_strategy = "steps"
eval_steps = 100
save_steps = 200
logging_steps = 10
seed = 42

# QLoRA: 4-bit base
load_in_4bit = true
bnb_4bit_compute_dtype = "bfloat16"
bnb_4bit_quant_type = "nf4"
bnb_4bit_use_double_quant = true


[[targets]]
name = "llama3.1"
enabled = true
hf_model = "meta-llama/Meta-Llama-3.1-8B-Instruct"
chat_template = "llama3"
output_name = "llama3.1-8b-instruct-mine"

[[targets]]
name = "qwen2.5"
enabled = true
hf_model = "Qwen/Qwen2.5-7B-Instruct"
chat_template = "qwen"
output_name = "qwen2.5-7b-instruct-mine"

[[targets]]
name = "mistral"
enabled = true
hf_model = "mistralai/Mistral-7B-Instruct-v0.3"
chat_template = "mistral"
output_name = "mistral-7b-instruct-mine"

[[targets]]
name = "gemma2"
# Gemma 2 9B is tighter on 16 GB VRAM; default off until you've benchmarked.
enabled = false
hf_model = "google/gemma-2-9b-it"
chat_template = "gemma"
output_name = "gemma2-9b-instruct-mine"
